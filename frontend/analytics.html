<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NxT DataBase | Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header" style="text-align: center;">
            <img src="img/logo.png" alt="NxT Database Logo"
                style="max-height: 80px; width: auto; margin-bottom: 0.5rem;">
            <h2>NxT DataBase</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="discord-dashboard.html">Discord Sales</a></li>
            <li><a href="games-dashboard.html">Game Sales</a></li>
            <li><a href="analytics.html" class="active">Analytics</a></li>
            <li><a href="add-discord-sale.html">Add Discord Sale</a></li>
            <li><a href="add-game-sale.html">Add Game Sale</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Analytics Dashboard</h1>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3 style="margin-bottom: 1rem;">Revenue & Profit (Last 7 Days)</h3>
                <canvas id="profitPerDayChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-bottom: 1rem;">Discord vs Game Sales (Revenue)</h3>
                <canvas id="discordVsGameChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-bottom: 1rem;">Top Payment Methods</h3>
                <canvas id="paymentMethodsChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-bottom: 1rem;">Top Dealers (By Total Sales)</h3>
                <canvas id="dealersChart"></canvas>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/analytics.js"></script>
</body>

</html>
